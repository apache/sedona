<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="360" fill="white"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" fill="#333" font-weight="bold">How the `raster` data source tiles a GeoTIFF</text>

  <!-- Left: source file -->
  <text x="120" y="68" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Source file on disk</text>
  <rect x="40" y="80" width="160" height="200" fill="#FFF8E1" stroke="#E65100" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="12" fill="#666">scene.tif</text>
  <!-- internal tile grid -->
  <g stroke="#E65100" stroke-width="1" fill="none" opacity="0.6">
    <line x1="80"  y1="120" x2="80"  y2="270"/>
    <line x1="120" y1="120" x2="120" y2="270"/>
    <line x1="160" y1="120" x2="160" y2="270"/>
    <line x1="40"  y1="160" x2="200" y2="160"/>
    <line x1="40"  y1="200" x2="200" y2="200"/>
    <line x1="40"  y1="240" x2="200" y2="240"/>
  </g>
  <rect x="40" y="120" width="160" height="150" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <text x="120" y="295" text-anchor="middle" font-size="11" fill="#666">3 × 4 internal tiles</text>

  <!-- Arrow -->
  <line x1="220" y1="180" x2="330" y2="180" stroke="#333" stroke-width="2"/>
  <polygon points="330,180 322,175 322,185" fill="#333"/>
  <text x="275" y="170" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">sedona.read</text>
  <text x="275" y="195" text-anchor="middle" font-size="11" fill="#666">.format("raster")</text>

  <!-- Middle: arrow gap -->

  <!-- Right: DataFrame -->
  <text x="630" y="68" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">DataFrame: one row per tile</text>
  <g font-size="11" fill="#333">
    <!-- header -->
    <rect x="360" y="80" width="520" height="28" fill="#1565C0"/>
    <text x="410" y="98" text-anchor="middle" fill="white" font-weight="bold">rast</text>
    <text x="510" y="98" text-anchor="middle" fill="white" font-weight="bold">x</text>
    <text x="560" y="98" text-anchor="middle" fill="white" font-weight="bold">y</text>
    <text x="700" y="98" text-anchor="middle" fill="white" font-weight="bold">name</text>
    <!-- rows -->
    <rect x="360" y="108" width="520" height="28" fill="#E3F2FD" stroke="#90CAF9"/>
    <text x="410" y="126" text-anchor="middle">Raster(0,0)</text>
    <text x="510" y="126" text-anchor="middle">0</text>
    <text x="560" y="126" text-anchor="middle">0</text>
    <text x="700" y="126" text-anchor="middle">scene.tif</text>
    <rect x="360" y="136" width="520" height="28" fill="white" stroke="#90CAF9"/>
    <text x="410" y="154" text-anchor="middle">Raster(1,0)</text>
    <text x="510" y="154" text-anchor="middle">1</text>
    <text x="560" y="154" text-anchor="middle">0</text>
    <text x="700" y="154" text-anchor="middle">scene.tif</text>
    <rect x="360" y="164" width="520" height="28" fill="#E3F2FD" stroke="#90CAF9"/>
    <text x="410" y="182" text-anchor="middle">Raster(2,0)</text>
    <text x="510" y="182" text-anchor="middle">2</text>
    <text x="560" y="182" text-anchor="middle">0</text>
    <text x="700" y="182" text-anchor="middle">scene.tif</text>
    <rect x="360" y="192" width="520" height="28" fill="white" stroke="#90CAF9"/>
    <text x="410" y="210" text-anchor="middle">Raster(0,1)</text>
    <text x="510" y="210" text-anchor="middle">0</text>
    <text x="560" y="210" text-anchor="middle">1</text>
    <text x="700" y="210" text-anchor="middle">scene.tif</text>
    <rect x="360" y="220" width="520" height="28" fill="#E3F2FD" stroke="#90CAF9"/>
    <text x="410" y="238" text-anchor="middle">...</text>
    <text x="510" y="238" text-anchor="middle">...</text>
    <text x="560" y="238" text-anchor="middle">...</text>
    <text x="700" y="238" text-anchor="middle">...</text>
  </g>
  <text x="620" y="270" text-anchor="middle" font-size="11" fill="#666">x, y are 0-based tile indices into the source grid</text>

  <!-- Footer note -->
  <text x="450" y="320" text-anchor="middle" font-size="12" fill="#333">
    A small GeoTIFF may produce a single row; a multi-GB GeoTIFF can produce thousands.
  </text>
  <text x="450" y="340" text-anchor="middle" font-size="12" fill="#666">
    The same downstream SQL works regardless of the row count.
  </text>
</svg>
