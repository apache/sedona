<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
  </defs>
  <text x="250" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">ST_OffsetCurve — quadrantSegments Effect</text>
  <!-- Same L-shape with outer offset, comparing default vs qs=16 -->
  <!-- Using same mapping as negative SVG -->
  <!-- Input: LINESTRING(0 0, 10 0, 10 10) -->
  <polyline points="69,196 356,196 356,49" fill="none" stroke="#4a90d9" stroke-width="3" />
  <circle cx="69" cy="196" r="4" fill="#4a90d9" />
  <circle cx="356" cy="196" r="4" fill="#4a90d9" />
  <circle cx="356" cy="49" r="4" fill="#4a90d9" />
  <text x="40" y="192" font-size="11" fill="#4a90d9">(0, 0)</text>
  <text x="320" y="192" font-size="11" fill="#4a90d9">(10, 0)</text>
  <text x="360" y="47" font-size="11" fill="#4a90d9">(10, 10)</text>
  <!-- Default (qs=8): 9 arc points → coarser arc -->
  <polyline points="69,240 356,240 373,239 389,237 404,233 417,227 427,221 435,213 440,205 413,196 413,49"
    fill="none" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="6,4" />
  <!-- qs=16: 17 arc points → smoother arc (interpolated between the 9 default points) -->
  <polyline points="69,240 356,240 364,240 373,239 381,238 389,237 397,235 404,233 410,230 417,227 422,224 427,221 431,217 435,213 438,209 440,205 441,200 413,196 413,49"
    fill="none" stroke="#9b59b6" stroke-width="2.5" />
  <!-- Zoom circle on the arc corner area -->
  <circle cx="413" cy="218" r="45" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" />
  <text x="460" y="218" font-size="11" fill="#999">corner arc</text>
  <!-- Annotations -->
  <text x="69" y="254" font-size="11" fill="#e67e22">(0, -3)</text>
  <text x="416" y="55" font-size="11" fill="#9b59b6">(13, 10)</text>
  <!-- Point count labels -->
  <text x="260" y="42" font-size="12" fill="#e67e22">default (8): 11 points</text>
  <text x="260" y="57" font-size="12" fill="#9b59b6">quadrantSegments=16: 19 points</text>
  <!-- Caption -->
  <text x="250" y="290" text-anchor="middle" font-size="13" fill="#333333" font-style="italic">Higher quadrantSegments produces smoother arcs at outer corners</text>
  <!-- Legend -->
  <rect x="43" y="265" width="12" height="12" rx="2" fill="#4a90d9" stroke="#4a90d9" stroke-width="1" />
  <text x="59" y="276" font-size="13" fill="#333333">Input</text>
  <rect x="133" y="265" width="12" height="12" rx="2" fill="#e67e22" stroke="#e67e22" stroke-width="1" />
  <text x="149" y="276" font-size="13" fill="#333333">Default (qs=8)</text>
  <rect x="293" y="265" width="12" height="12" rx="2" fill="#9b59b6" stroke="#9b59b6" stroke-width="1" />
  <text x="309" y="276" font-size="13" fill="#333333">Smoother (qs=16)</text>
</svg>
