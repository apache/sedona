<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380" font-family="Arial, Helvetica, sans-serif">
<rect width="700" height="380" fill="white"/>
<text x="350" y="28" text-anchor="middle" font-size="17" fill="#333" font-weight="bold">RS_SkewY</text>
<text x="350" y="48" text-anchor="middle" font-size="12" fill="#666">Y skew: vertical shift per column</text>
<text x="160" y="85" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">SkewY = 0 (no skew)</text>
<rect x="70" y="95" width="180" height="180" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<line x1="130" y1="95" x2="130" y2="275" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="190" y1="95" x2="190" y2="275" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="70" y1="155" x2="250" y2="155" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="70" y1="215" x2="250" y2="215" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="70" y1="95" x2="260" y2="95" stroke="#666" stroke-width="0.8" stroke-dasharray="3,3"/>
<text x="360" y="185" text-anchor="middle" font-size="28" fill="#333" font-weight="bold">→</text>
<text x="500" y="85" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">SkewY = 0.5</text>
<polygon points="410,95 590,143 590,323 410,275" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<line x1="470" y1="111" x2="470" y2="291" stroke="#1565C0" stroke-width="0.8" opacity="0.4"/>
<line x1="530" y1="127" x2="530" y2="307" stroke="#1565C0" stroke-width="0.8" opacity="0.4"/>
<line x1="410" y1="155" x2="590" y2="203" stroke="#1565C0" stroke-width="0.8" opacity="0.4"/>
<line x1="410" y1="215" x2="590" y2="263" stroke="#1565C0" stroke-width="0.8" opacity="0.4"/>
<line x1="410" y1="95" x2="600" y2="95" stroke="#666" stroke-width="0.8" stroke-dasharray="3,3"/>
<line x1="470" y1="95" x2="470" y2="108" stroke="#D32F2F" stroke-width="1.5"/>
<polygon points="470,111 467,106 473,106" fill="#D32F2F"/>
<text x="478" y="107" text-anchor="start" font-size="9" fill="#D32F2F" font-weight="bold">SkewY</text>
<line x1="530" y1="95" x2="530" y2="124" stroke="#D32F2F" stroke-width="1.5"/>
<polygon points="530,127 527,122 533,122" fill="#D32F2F"/>
<text x="538" y="115" text-anchor="start" font-size="9" fill="#D32F2F" font-weight="bold">2×SkewY</text>
<line x1="590" y1="95" x2="590" y2="140" stroke="#D32F2F" stroke-width="1.5"/>
<polygon points="590,143 587,138 593,138" fill="#D32F2F"/>
<text x="598" y="123" text-anchor="start" font-size="9" fill="#D32F2F" font-weight="bold">3×SkewY</text>
<text x="350" y="365" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Column c is shifted vertically by c × SkewY from the origin</text>
</svg>