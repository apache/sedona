<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
  </defs>
  <text x="250" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">ST_Contains(A, B)</text>
  <rect x="380" y="8" width="60" height="22" rx="4" fill="#27ae60" />
  <text x="410" y="24" text-anchor="middle" font-size="12" font-weight="bold" fill="white">TRUE</text>

  <!-- Equirectangular map frame: lon [-180,180] -> x [60,440], lat [90,-90] -> y [60,240] -->
  <rect x="60" y="60" width="380" height="180" fill="#f7f9fb" stroke="#c9d4df" stroke-width="1" />
  <line x1="123.3" y1="60" x2="123.3" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="186.7" y1="60" x2="186.7" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="250" y1="60" x2="250" y2="240" stroke="#c0cbd6" stroke-width="1" />
  <line x1="313.3" y1="60" x2="313.3" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="376.7" y1="60" x2="376.7" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="90" x2="440" y2="90" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="120" x2="440" y2="120" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="150" x2="440" y2="150" stroke="#c0cbd6" stroke-width="1" />
  <line x1="60" y1="180" x2="440" y2="180" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="210" x2="440" y2="210" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />

  <!-- Polygon A: lon [-10, 60], lat [35, 70] (Europe/Western Russia) -->
  <path d="M 239.45 115 L 313.33 115 L 313.33 80 L 239.45 80 Z"
        fill="rgba(74,144,217,0.25)" stroke="#4a90d9" stroke-width="2.5" />
  <text x="248" y="75" font-size="14" font-weight="bold" fill="#4a90d9">A</text>

  <!-- Polygon B inside A: lon [10, 35], lat [45, 60] (Central Europe) -->
  <path d="M 260.56 105 L 286.94 105 L 286.94 90 L 260.56 90 Z"
        fill="rgba(217,74,74,0.3)" stroke="#d94a4a" stroke-width="2" />
  <text x="273.75" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#d94a4a">B</text>

  <text x="250" y="258" text-anchor="middle" font-size="12" fill="#666666" font-style="italic">Geography A fully contains geography B on the sphere</text>

  <rect x="118" y="275" width="12" height="12" rx="2" fill="#4a90d9" stroke="#4a90d9" stroke-width="1" fill-opacity="0.6" />
  <text x="134" y="285" font-size="12" fill="#333333">Geography A</text>
  <rect x="248" y="275" width="12" height="12" rx="2" fill="#d94a4a" stroke="#d94a4a" stroke-width="1" fill-opacity="0.6" />
  <text x="264" y="285" font-size="12" fill="#333333">Geography B</text>
</svg>
