<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">Cloud Optimized GeoTIFF (COG) Structure</text>
  <text x="320" y="46" text-anchor="middle" font-size="12" fill="#666666">How file properties map to geotiff.metadata schema fields</text>

  <!-- Full-resolution stacked bands (flat 2D with offset) -->
  <!-- Band 3 (back, Blue) -->
  <rect x="80" y="80" width="200" height="130" fill="rgba(74,144,217,0.35)" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="180" y="99" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a90d9">Band 3 (Blue)</text>

  <!-- Band 2 (middle, Green) offset -->
  <rect x="70" y="100" width="200" height="130" fill="rgba(39,174,96,0.35)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="170" y="119" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Band 2 (Green)</text>

  <!-- Band 1 (front, Red) — shows tile grid -->
  <rect x="60" y="120" width="200" height="130" fill="rgba(217,74,74,0.22)" stroke="#d94a4a" stroke-width="2"/>
  <text x="160" y="139" text-anchor="middle" font-size="11" font-weight="bold" fill="#d94a4a">Band 1 (Red) — 4096×4096</text>

  <!-- Tile grid on front band -->
  <g stroke="#d94a4a" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.65">
    <line x1="110" y1="148" x2="110" y2="250"/>
    <line x1="160" y1="148" x2="160" y2="250"/>
    <line x1="210" y1="148" x2="210" y2="250"/>
    <line x1="60"  y1="174" x2="260" y2="174"/>
    <line x1="60"  y1="200" x2="260" y2="200"/>
    <line x1="60"  y1="226" x2="260" y2="226"/>
  </g>

  <!-- Highlighted tile -->
  <rect x="63" y="151" width="45" height="22" fill="rgba(217,74,74,0.4)" stroke="#d94a4a" stroke-width="1"/>
  <text x="85" y="166" text-anchor="middle" font-size="9" fill="#d94a4a">256×256</text>

  <!-- numBands annotation -->
  <line x1="280" y1="80" x2="342" y2="90" stroke="#333" stroke-width="1"/>
  <rect x="342" y="78" width="120" height="24" rx="4" fill="rgba(142,68,173,0.1)" stroke="#8e44ad" stroke-width="1"/>
  <text x="402" y="94" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">numBands = 3</text>

  <!-- isTiled annotation -->
  <line x1="260" y1="152" x2="340" y2="144" stroke="#333" stroke-width="1"/>
  <rect x="342" y="132" width="120" height="24" rx="4" fill="rgba(217,74,74,0.1)" stroke="#d94a4a" stroke-width="1"/>
  <text x="402" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#d94a4a">isTiled = true</text>

  <!-- blockSize annotation -->
  <line x1="108" y1="162" x2="340" y2="180" stroke="#333" stroke-width="1"/>
  <rect x="342" y="170" width="135" height="24" rx="4" fill="rgba(217,74,74,0.1)" stroke="#d94a4a" stroke-width="1"/>
  <text x="410" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#d94a4a">blockSize = 256×256</text>

  <!-- compression annotation -->
  <rect x="342" y="202" width="135" height="24" rx="4" fill="rgba(217,74,74,0.1)" stroke="#d94a4a" stroke-width="1"/>
  <text x="410" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#d94a4a">compression = LZW</text>

  <!-- GeoTransform -->
  <rect x="490" y="78" width="140" height="148" rx="4" fill="rgba(74,144,217,0.06)" stroke="#4a90d9" stroke-width="1"/>
  <text x="560" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90d9">geoTransform</text>
  <g font-size="10" fill="#333333" font-family="monospace">
    <text x="498" y="113">upperLeftX: -117.5</text>
    <text x="498" y="128">upperLeftY:  34.2</text>
    <text x="498" y="143">scaleX:     0.001</text>
    <text x="498" y="158">scaleY:    -0.001</text>
    <text x="498" y="173">skewX:      0.0</text>
    <text x="498" y="188">skewY:      0.0</text>
  </g>
  <text x="560" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a90d9">srid: 4326</text>
  <text x="560" y="222" text-anchor="middle" font-size="9" fill="#666">crs: WGS 84</text>

  <!-- Overviews row -->
  <text x="60" y="285" font-size="12" font-weight="bold" fill="#27ae60">Overviews (pyramid)</text>

  <!-- Overview 1: stacked flat bands -->
  <rect x="76" y="302" width="100" height="60" fill="rgba(74,144,217,0.3)" stroke="#27ae60" stroke-width="1"/>
  <rect x="70" y="314" width="100" height="60" fill="rgba(39,174,96,0.3)" stroke="#27ae60" stroke-width="1"/>
  <rect x="64" y="326" width="100" height="60" fill="rgba(217,74,74,0.22)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="114" y="360" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Level 1</text>
  <text x="114" y="374" text-anchor="middle" font-size="9" fill="#555">2048×2048</text>

  <!-- Overview 2: stacked flat bands -->
  <rect x="204" y="318" width="58" height="38" fill="rgba(74,144,217,0.3)" stroke="#27ae60" stroke-width="1"/>
  <rect x="200" y="326" width="58" height="38" fill="rgba(39,174,96,0.3)" stroke="#27ae60" stroke-width="1"/>
  <rect x="196" y="334" width="58" height="38" fill="rgba(217,74,74,0.22)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="225" y="354" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Level 2</text>
  <text x="225" y="366" text-anchor="middle" font-size="8" fill="#555">1024×1024</text>

  <!-- Overview 3: stacked flat bands -->
  <rect x="288" y="338" width="30" height="22" fill="rgba(74,144,217,0.3)" stroke="#27ae60" stroke-width="1"/>
  <rect x="285" y="343" width="30" height="22" fill="rgba(39,174,96,0.3)" stroke="#27ae60" stroke-width="1"/>
  <rect x="282" y="348" width="30" height="22" fill="rgba(217,74,74,0.22)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="297" y="362" text-anchor="middle" font-size="8" font-weight="bold" fill="#27ae60">L3</text>

  <!-- Overviews annotation -->
  <line x1="320" y1="355" x2="370" y2="335" stroke="#27ae60" stroke-width="1"/>
  <rect x="372" y="295" width="260" height="80" rx="4" fill="rgba(39,174,96,0.06)" stroke="#27ae60" stroke-width="1"/>
  <text x="382" y="311" font-size="11" font-weight="bold" fill="#27ae60">overviews:</text>
  <text x="390" y="327" font-size="10" fill="#333" font-family="monospace">{level:1, width:2048, height:2048}</text>
  <text x="390" y="342" font-size="10" fill="#333" font-family="monospace">{level:2, width:1024, height:1024}</text>
  <text x="390" y="357" font-size="10" fill="#333" font-family="monospace">{level:3, width: 512, height: 512}</text>
  <text x="502" y="370" text-anchor="middle" font-size="10" font-style="italic" fill="#27ae60">3 internal overview IFDs</text>

  <!-- Bottom caption -->
  <text x="320" y="412" text-anchor="middle" font-size="11" font-style="italic" fill="#666666">Multi-band COGs store each band with its own tiling. Overviews are downsampled copies of all bands.</text>
  <text x="320" y="428" text-anchor="middle" font-size="10" fill="#888888">COG detection: isTiled AND size(overviews) &gt; 0</text>
</svg>
