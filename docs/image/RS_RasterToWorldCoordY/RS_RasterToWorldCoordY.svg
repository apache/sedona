<svg xmlns="http://www.w3.org/2000/svg" width="620" height="360" viewBox="0 0 620 360" font-family="Arial, Helvetica, sans-serif">
<rect width="620" height="360" fill="white"/>
<text x="310" y="28" text-anchor="middle" font-size="17" fill="#333" font-weight="bold" font-style="normal">RS_RasterToWorldCoordY</text><text x="310" y="48" text-anchor="middle" font-size="12" fill="#666" font-weight="normal" font-style="normal">Returns the world Y coordinate for a given grid column and row</text><rect x="60" y="80" width="275" height="180" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<line x1="115" y1="80" x2="115" y2="260" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="170" y1="80" x2="170" y2="260" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="225" y1="80" x2="225" y2="260" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="280" y1="80" x2="280" y2="260" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="60" y1="125" x2="335" y2="125" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="60" y1="170" x2="335" y2="170" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
<line x1="60" y1="215" x2="335" y2="215" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/><text x="87.5" y="74" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">1</text><text x="142.5" y="74" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">2</text><text x="197.5" y="74" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">3</text><text x="252.5" y="74" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">4</text><text x="307.5" y="74" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">5</text><text x="197.5" y="60" text-anchor="middle" font-size="10" fill="#666" font-weight="normal" font-style="normal">column</text><text x="50" y="106.5" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">1</text><text x="50" y="151.5" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">2</text><text x="50" y="196.5" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">3</text><text x="50" y="241.5" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-style="normal">4</text><text x="40" y="155.0" text-anchor="end" font-size="10" fill="#666" font-weight="normal" font-style="normal">row</text><rect x="60" y="170" width="55" height="45" fill="#FFF3E0" stroke="#FF8F00" stroke-width="2.5"/><text x="87.5" y="196.5" text-anchor="middle" font-size="11" fill="#FF8F00" font-weight="bold" font-style="normal">(1, 3)</text><line x1="345" y1="192.5" x2="390" y2="150" stroke="#333" stroke-width="1.5"/>
<polygon points="390,150 388.0,157.8 382.1,151.5" fill="#333"/><rect x="400" y="110" width="200" height="100" fill="#F5F5F5" stroke="#666" stroke-width="1" rx="6"/><text x="500" y="135" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-style="normal">World Coordinate</text><text x="500" y="162" text-anchor="middle" font-size="16" fill="#D32F2F" font-weight="bold" font-style="normal">Y = 34</text><text x="500" y="185" text-anchor="middle" font-size="10" fill="#666" font-weight="normal" font-style="normal">(X also computed but</text><text x="500" y="198" text-anchor="middle" font-size="10" fill="#666" font-weight="normal" font-style="normal">only Y is returned)</text><text x="310" y="290" text-anchor="middle" font-size="12" fill="#333" font-weight="normal" font-style="normal">y = UpperLeftY + (row-1)·ScaleY + (col-1)·SkewY</text><text x="310" y="310" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="normal" font-style="normal">Example: 54 + (3-1)·(-10) + (1-1)·0 = 34</text></svg>