<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2ecc71" />
    </marker>
    <marker id="arrowGrev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#2ecc71" />
    </marker>
  </defs>
  <text x="250" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">ST_ShortestLine</text>
  <!-- Geometry A: polygon -->
  <path d="M 100 200 L 200 200 L 200 100 L 100 100 L 100 200 Z" fill="rgba(74,144,217,0.15)" stroke="#4a90d9" stroke-width="2.5" fill-rule="evenodd" />
  <text x="150" y="160" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a90d9">A</text>
  <!-- Geometry B: triangle -->
  <path d="M 340 80 L 400 200 L 280 200 Z" fill="rgba(217,74,74,0.15)" stroke="#d94a4a" stroke-width="2.5" fill-rule="evenodd" />
  <text x="340" y="175" text-anchor="middle" font-size="15" font-weight="bold" fill="#d94a4a">B</text>
  <!-- Shortest line between them -->
  <line x1="200" y1="164" x2="296" y2="164" stroke="#2ecc71" stroke-width="3" marker-start="url(#arrowGrev)" marker-end="url(#arrowG)" />
  <!-- Endpoints -->
  <circle cx="200" cy="164" r="5" fill="white" stroke="#2ecc71" stroke-width="2.5" />
  <circle cx="200" cy="164" r="2.5" fill="#2ecc71" />
  <circle cx="296" cy="164" r="5" fill="white" stroke="#2ecc71" stroke-width="2.5" />
  <circle cx="296" cy="164" r="2.5" fill="#2ecc71" />
  <!-- Caption -->
  <text x="250" y="292" text-anchor="middle" font-size="13" fill="#333333" font-style="italic">Returns the shortest LineString connecting A and B</text>
  <!-- Legend -->
  <rect x="73" y="255" width="12" height="12" rx="2" fill="#4a90d9" stroke="#4a90d9" stroke-width="1" />
  <text x="89" y="266" font-size="13" fill="#333333">Geometry A</text>
  <rect x="183" y="255" width="12" height="12" rx="2" fill="#d94a4a" stroke="#d94a4a" stroke-width="1" />
  <text x="199" y="266" font-size="13" fill="#333333">Geometry B</text>
  <rect x="293" y="255" width="12" height="12" rx="2" fill="#2ecc71" stroke="#2ecc71" stroke-width="1" />
  <text x="309" y="266" font-size="13" fill="#333333">Shortest line</text>
</svg>
