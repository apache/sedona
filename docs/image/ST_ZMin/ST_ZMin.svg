<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <rect width="400" height="180" fill="#f5f5f5" rx="5"/>
  <text x="200" y="18" font-family="monospace" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">ST_ZMin</text>
  <text x="200" y="32" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">LINESTRING Z(0 0 4, 2 1 7, 4 0 1, 6 1 6, 8 0 3)</text>
  <!-- Ground plane grid -->
  <line x1="60" y1="130" x2="340" y2="130" stroke="#ddd" stroke-width="1"/>
  <!-- Z axis -->
  <line x1="60" y1="130" x2="60" y2="40" stroke="#aaa" stroke-width="1"/>
  <text x="50" y="44" font-family="monospace" font-size="8" fill="#999" text-anchor="end">Z</text>
  <!-- Z axis ticks -->
  <line x1="57" y1="118" x2="60" y2="118" stroke="#aaa" stroke-width="1"/>
  <text x="54" y="121" font-family="monospace" font-size="7" fill="#999" text-anchor="end">1</text>
  <line x1="57" y1="94" x2="60" y2="94" stroke="#aaa" stroke-width="1"/>
  <text x="54" y="97" font-family="monospace" font-size="7" fill="#999" text-anchor="end">4</text>
  <line x1="57" y1="58" x2="60" y2="58" stroke="#aaa" stroke-width="1"/>
  <text x="54" y="61" font-family="monospace" font-size="7" fill="#999" text-anchor="end">7</text>
  <!-- Vertical dashed drop-lines from points to ground -->
  <line x1="95" y1="94" x2="95" y2="130" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="165" y1="58" x2="165" y2="130" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="235" y1="118" x2="235" y2="130" stroke="#E53935" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="305" y1="70" x2="305" y2="130" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="340" y1="106" x2="340" y2="130" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- LineString Z -->
  <polyline points="95,94 165,58 235,118 305,70 340,106" fill="none" stroke="#1565C0" stroke-width="2"/>
  <!-- Vertices -->
  <circle cx="95" cy="94" r="3" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="95" y="90" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="middle">Z=4</text>
  <circle cx="165" cy="58" r="3" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="165" y="54" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="middle">Z=7</text>
  <!-- ZMin point highlighted -->
  <circle cx="235" cy="118" r="6" fill="#E53935" stroke="#fff" stroke-width="1.5"/>
  <text x="235" y="114" font-family="monospace" font-size="9" fill="#E53935" text-anchor="middle" font-weight="bold">Z=1 (min)</text>
  <circle cx="305" cy="70" r="3" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="305" y="66" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="middle">Z=6</text>
  <circle cx="340" cy="106" r="3" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="340" y="102" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="middle">Z=3</text>
  <!-- Result -->
  <text x="200" y="148" font-family="monospace" font-size="10" fill="#E53935" text-anchor="middle">Returns: 1.0</text>
  <!-- Legend -->
  <rect x="110" y="162" width="8" height="8" fill="rgba(21,101,192,0.2)" stroke="#1565C0" stroke-width="1"/>
  <text x="122" y="170" font-family="monospace" font-size="9" fill="#1565C0">LineString Z</text>
  <circle cx="214" cy="166" r="4" fill="#E53935"/>
  <text x="222" y="170" font-family="monospace" font-size="9" fill="#E53935">Min Z vertex</text>
</svg>