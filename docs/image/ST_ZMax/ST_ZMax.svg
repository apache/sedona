<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <rect width="400" height="220" fill="#f5f5f5" rx="5"/>
  <text x="200" y="18" font-family="monospace" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">ST_ZMax</text>
  <text x="200" y="32" font-family="monospace" font-size="9" fill="#888" text-anchor="middle">POLYGON Z with vertices at varying Z heights</text>
  <!-- Isometric axes from origin at (70,160) -->
  <!-- X axis -->
  <line x1="70" y1="160" x2="210" y2="160" stroke="#aaa" stroke-width="1"/>
  <text x="215" y="163" font-family="monospace" font-size="9" fill="#999">X</text>
  <!-- Y axis -->
  <line x1="70" y1="160" x2="170" y2="118" stroke="#aaa" stroke-width="1"/>
  <text x="175" y="116" font-family="monospace" font-size="9" fill="#999">Y</text>
  <!-- Z axis -->
  <line x1="70" y1="160" x2="70" y2="38" stroke="#aaa" stroke-width="1"/>
  <text x="64" y="35" font-family="monospace" font-size="9" fill="#999">Z</text>
  <!-- Projection: sx = 70 + x*16 + y*10, sy = 160 - z*13 - y*4 -->
  <!-- Pentagon vertices (x,y,z): A(0,0,2) B(5,1,3) C(8,5,8) D(3,7,4) E(0,4,1) -->
  <!-- A: (70, 160-26-0) = (70, 134) gnd=(70,160) -->
  <!-- B: (70+80+10, 160-39-4) = (160, 117) gnd=(160,156) -->
  <!-- C: (70+128+50, 160-104-20) = (248, 36) gnd=(248,140) -->
  <!-- D: (70+48+70, 160-52-28) = (188, 80) gnd=(188,132) -->
  <!-- E: (70+0+40, 160-13-16) = (110, 131) gnd=(110,144) -->
  <!-- Ground shadow polygon -->
  <polygon points="70,160 160,156 248,140 188,132 110,144" fill="rgba(0,0,0,0.04)" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Vertical pillars from ground to 3D vertices -->
  <line x1="70" y1="134" x2="70" y2="160" stroke="#bbb" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="160" y1="117" x2="160" y2="156" stroke="#bbb" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="248" y1="36" x2="248" y2="140" stroke="#E53935" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="188" y1="80" x2="188" y2="132" stroke="#bbb" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="110" y1="131" x2="110" y2="144" stroke="#bbb" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- 3D polygon face -->
  <polygon points="70,134 160,117 248,36 188,80 110,131" fill="rgba(21,101,192,0.15)" stroke="#1565C0" stroke-width="2" stroke-linejoin="round"/>
  <!-- Side faces (walls) for depth effect -->
  <polygon points="70,134 70,160 160,156 160,117" fill="rgba(21,101,192,0.06)" stroke="#1565C0" stroke-width="0.5"/>
  <polygon points="160,117 160,156 248,140 248,36" fill="rgba(21,101,192,0.06)" stroke="#1565C0" stroke-width="0.5"/>
  <polygon points="110,131 110,144 70,160 70,134" fill="rgba(21,101,192,0.06)" stroke="#1565C0" stroke-width="0.5"/>
  <!-- Vertices -->
  <circle cx="70" cy="134" r="3.5" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="58" y="131" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="end">Z=2</text>
  <circle cx="160" cy="117" r="3.5" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="172" y="115" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="start">Z=3</text>
  <!-- ZMax highlighted -->
  <circle cx="248" cy="36" r="6" fill="#E53935" stroke="#fff" stroke-width="1.5"/>
  <text x="260" y="34" font-family="monospace" font-size="9" fill="#E53935" text-anchor="start" font-weight="bold">Z=8 (max)</text>
  <circle cx="188" cy="80" r="3.5" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="200" y="78" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="start">Z=4</text>
  <circle cx="110" cy="131" r="3.5" fill="#1565C0" stroke="#fff" stroke-width="1"/>
  <text x="98" y="128" font-family="monospace" font-size="8" fill="#1565C0" text-anchor="end">Z=1</text>
  <!-- Result -->
  <text x="200" y="185" font-family="monospace" font-size="10" fill="#E53935" text-anchor="middle">Returns: 8.0</text>
  <!-- Legend -->
  <rect x="100" y="200" width="8" height="8" fill="rgba(21,101,192,0.15)" stroke="#1565C0" stroke-width="1"/>
  <text x="112" y="208" font-family="monospace" font-size="9" fill="#1565C0">Polygon Z</text>
  <circle cx="194" cy="204" r="4" fill="#E53935"/>
  <text x="202" y="208" font-family="monospace" font-size="9" fill="#E53935">Max Z vertex</text>
</svg>