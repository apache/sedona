<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2ecc71" />
    </marker>
    <marker id="arrowGrev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#2ecc71" />
    </marker>
  </defs>
  <text x="250" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">ST_Distance</text>

  <!-- Equirectangular map frame: lon [-180,180] -> x [60,440], lat [90,-90] -> y [60,240] -->
  <rect x="60" y="60" width="380" height="180" fill="#f7f9fb" stroke="#c9d4df" stroke-width="1" />
  <!-- Meridians every 60 deg -->
  <line x1="123.3" y1="60" x2="123.3" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="186.7" y1="60" x2="186.7" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="250" y1="60" x2="250" y2="240" stroke="#c0cbd6" stroke-width="1" />
  <line x1="313.3" y1="60" x2="313.3" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="376.7" y1="60" x2="376.7" y2="240" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <!-- Parallels every 30 deg -->
  <line x1="60" y1="90" x2="440" y2="90" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="120" x2="440" y2="120" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="150" x2="440" y2="150" stroke="#c0cbd6" stroke-width="1" />
  <line x1="60" y1="180" x2="440" y2="180" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />
  <line x1="60" y1="210" x2="440" y2="210" stroke="#d8e0e8" stroke-width="0.75" stroke-dasharray="2,3" />

  <!-- Great-circle arc from NYC (-74, 40.7) to Moscow (37.6, 55.8); peaks near Greenland (~-18, 64) -->
  <path d="M 171.9 109.3 Q 231.0 70.0 289.6 94.2" fill="none" stroke="#2ecc71" stroke-width="2.2"
        stroke-dasharray="6,3" marker-start="url(#arrowGrev)" marker-end="url(#arrowG)" />
  <!-- Distance label mid-arc -->
  <rect x="210" y="62" width="96" height="20" rx="10" fill="#ffffff" stroke="#2ecc71" stroke-width="1.2" />
  <text x="258" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#2ecc71" font-style="italic">d ≈ 7,500 km</text>

  <!-- Endpoint A: New York -->
  <circle cx="171.9" cy="109.3" r="5.5" fill="#4a90d9" stroke="#ffffff" stroke-width="1.5" />
  <text x="171.9" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a90d9">A</text>
  <!-- Endpoint B: Moscow -->
  <circle cx="289.6" cy="94.2" r="5.5" fill="#d94a4a" stroke="#ffffff" stroke-width="1.5" />
  <text x="289.6" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#d94a4a">B</text>

  <!-- Caption -->
  <text x="250" y="258" text-anchor="middle" font-size="12" fill="#333333" font-style="italic">Returns the geodesic (great-circle) distance between two geographies in meters</text>

  <!-- Legend -->
  <rect x="78" y="275" width="12" height="12" rx="2" fill="#4a90d9" stroke="#4a90d9" stroke-width="1" />
  <text x="94" y="285" font-size="12" fill="#333333">Geography A</text>
  <rect x="188" y="275" width="12" height="12" rx="2" fill="#d94a4a" stroke="#d94a4a" stroke-width="1" />
  <text x="204" y="285" font-size="12" fill="#333333">Geography B</text>
  <rect x="298" y="275" width="12" height="12" rx="2" fill="#2ecc71" stroke="#2ecc71" stroke-width="1" />
  <text x="314" y="285" font-size="12" fill="#333333">Geodesic distance</text>
</svg>
