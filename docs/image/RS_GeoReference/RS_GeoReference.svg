<polygon points="45,90 47.7,94.2 42.3,94.2" fill="#1565C0"/><text x="40" y="117.5" text-anchor="end" font-size="10" fill="#1565C0" font-weight="bold" font-style="normal">ScaleY</text><text x="470" y="85" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-style="normal">GDAL Format (default)</text><rect x="380" y="95" width="195" height="160" fill="#F5F5F5" stroke="#666" stroke-width="1" rx="4"/><text x="395" y="117" text-anchor="start" font-size="13" fill="#1565C0" font-weight="bold" font-style="normal">ScaleX</text><text x="395" y="140" text-anchor="start" font-size="13" fill="#00796B" font-weight="bold" font-style="normal">SkewY</text><text x="395" y="163" text-anchor="start" font-size="13" fill="#00796B" font-weight="bold" font-style="normal">SkewX</text><text x="395" y="186" text-anchor="start" font-size="13" fill="#1565C0" font-weight="bold" font-style="normal">ScaleY</text><text x="395" y="209" text-anchor="start" font-size="13" fill="#FF8F00" font-weight="bold" font-style="normal">UpperLeftX</text><text x="395" y="232" text-anchor="start" font-size="13" fill="#FF8F00" font-weight="bold" font-style="normal">UpperLeftY</text><text x="690" y="85" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-style="normal">ESRI Format</text><rect x="600" y="95" width="195" height="160" fill="#F5F5F5" stroke="#666" stroke-width="1" rx="4"/><text x="615" y="117" text-anchor="start" font-size="13" fill="#1565C0" font-weight="bold" font-style="normal">ScaleX</text><text x="615" y="140" text-anchor="start" font-size="13" fill="#00796B" font-weight="bold" font-style="normal">SkewY</text><text x="615" y="163" text-anchor="start" font-size="13" fill="#00796B" font-weight="bold" font-style="normal">SkewX</text><text x="615" y="186" text-anchor="start" font-size="13" fill="#1565C0" font-weight="bold" font-style="normal">ScaleY</text><text x="615" y="209" text-anchor="start" font-size="11" fill="#FF8F00" font-weight="bold" font-style="normal">UpperLeftX + ScaleX×0.5</text><text x="615" y="232" text-anchor="start" font-size="11" fill="#FF8F00" font-weight="bold" font-style="normal">UpperLeftY + ScaleY×0.5</text><text x="697" y="270" text-anchor="middle" font-size="10" fill="#666" font-weight="normal" font-style="italic">ESRI uses pixel center</text><text x="477" y="270" text-anchor="middle" font-size="10" fill="#666" font-weight="normal" font-style="italic">GDAL uses pixel corner</text><text x="330" y="170" text-anchor="middle" font-size="24" fill="#333" font-weight="bold" font-style="normal">→</text><text x="390" y="310" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-style="normal">Example Output (GDAL):</text><rect x="200" y="318" width="380" height="28" fill="#F5F5F5" stroke="#666" stroke-width="1" rx="4"/><text x="390" y="337" text-anchor="middle" font-size="11" fill="#333" font-weight="normal" font-style="normal">2.000000 | 5.000000 | 4.000000 | -2.000000 | -53.000000 | 51.000000</text><text x="390" y="362" text-anchor="middle" font-size="9" fill="#666" font-weight="normal" font-style="normal">ScaleX     SkewY     SkewX      ScaleY    UpperLeftX    UpperLeftY</text></svg>