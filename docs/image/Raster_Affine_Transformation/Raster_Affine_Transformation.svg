<text x="450" y="28" text-anchor="middle" font-size="18" fill="#333" font-weight="bold" font-style="normal">Raster Affine Transformation</text><text x="200" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold" font-style="normal">Affine Matrix</text><rect x="90" y="92" width="250" height="80" fill="#F5F5F5" stroke="#666" stroke-width="1" rx="4"/><text x="135" y="120" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="bold" font-style="normal">ScaleX</text><text x="215" y="120" text-anchor="middle" font-size="13" fill="#00796B" font-weight="bold" font-style="normal">SkewX</text><text x="300" y="120" text-anchor="middle" font-size="12" fill="#FF8F00" font-weight="bold" font-style="normal">UpperLeftX</text><text x="135" y="147" text-anchor="middle" font-size="13" fill="#00796B" font-weight="bold" font-style="normal">SkewY</text><text x="215" y="147" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="bold" font-style="normal">ScaleY</text><text x="300" y="147" text-anchor="middle" font-size="12" fill="#FF8F00" font-weight="bold" font-style="normal">UpperLeftY</text><text x="80" y="202" text-anchor="start" font-size="12" fill="#333" font-weight="bold" font-style="normal">World coordinates:</text><text x="80" y="224" text-anchor="start" font-size="12" fill="#666" font-weight="normal" font-style="normal">x = ScaleX · col + SkewX · row + UpperLeftX</text><text x="80" y="244" text-anchor="start" font-size="12" fill="#666" font-weight="normal" font-style="normal">y = SkewY · col + ScaleY · row + UpperLeftY</text><line x1="500" y1="420" x2="860" y2="420" stroke="#333" stroke-width="1.5"/>
