<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- Pill label at top -->
  <rect x="180" y="8" width="140" height="28" rx="14" fill="#2ecc71" fill-opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="250" y="27" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">NPoints = 4</text>

  <!-- Sphere/globe (same ellipse as ST_Contains geography visuals) -->
  <ellipse cx="250" cy="160" rx="195" ry="85" fill="#c5c5eb" fill-opacity="0.55" stroke="#8e8ed0" stroke-width="1.8" />

  <!-- LineString (curved, suggesting great-circle-like path across the sphere surface) -->
  <path d="M 95 180 Q 140 125 200 118 T 305 118 T 405 175"
        fill="none" stroke="#2a4db3" stroke-width="2.5" stroke-linecap="round" />

  <!-- 4 vertices along the linestring -->
  <circle cx="95" cy="180" r="6" fill="#2e7d32" stroke="#ffffff" stroke-width="1.5" />
  <text x="95" y="203" text-anchor="middle" font-size="11" fill="#2e7d32">v1</text>

  <circle cx="200" cy="118" r="6" fill="#2e7d32" stroke="#ffffff" stroke-width="1.5" />
  <text x="200" y="108" text-anchor="middle" font-size="11" fill="#2e7d32">v2</text>

  <circle cx="305" cy="118" r="6" fill="#2e7d32" stroke="#ffffff" stroke-width="1.5" />
  <text x="305" y="108" text-anchor="middle" font-size="11" fill="#2e7d32">v3</text>

  <circle cx="405" cy="175" r="6" fill="#2e7d32" stroke="#ffffff" stroke-width="1.5" />
  <text x="405" y="197" text-anchor="middle" font-size="11" fill="#2e7d32">v4</text>

  <!-- Caption -->
  <text x="250" y="265" text-anchor="middle" font-size="12" fill="#666666" font-style="italic">Counts the vertices of a geography (same convention as ST_NPoints on geometries)</text>

  <!-- Footer label -->
  <text x="490" y="290" text-anchor="end" fill="#999" font-size="11">ST_NPoints</text>
</svg>
