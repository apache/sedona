<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" style="background:#ffffff">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2ecc71" />
    </marker>
    <marker id="arrowGrev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#2ecc71" />
    </marker>
  </defs>
  <text x="250" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333333">ST_ShortestLine — Point to Point</text>
  <!-- Point A at (0,0) mapped to canvas ~(120,200) -->
  <circle cx="120" cy="200" r="7" fill="rgba(74,144,217,0.3)" stroke="#4a90d9" stroke-width="2.5" />
  <circle cx="120" cy="200" r="3" fill="#4a90d9" />
  <text x="120" y="230" text-anchor="middle" font-size="13" fill="#4a90d9">POINT (0 0)</text>
  <!-- Point B at (3,4) mapped to canvas ~(360,80) -->
  <circle cx="360" cy="80" r="7" fill="rgba(217,74,74,0.3)" stroke="#d94a4a" stroke-width="2.5" />
  <circle cx="360" cy="80" r="3" fill="#d94a4a" />
  <text x="360" y="64" text-anchor="middle" font-size="13" fill="#d94a4a">POINT (3 4)</text>
  <!-- Shortest line -->
  <line x1="120" y1="200" x2="360" y2="80" stroke="#2ecc71" stroke-width="3" marker-start="url(#arrowGrev)" marker-end="url(#arrowG)" />
  <!-- Endpoints -->
  <circle cx="120" cy="200" r="5" fill="white" stroke="#2ecc71" stroke-width="2.5" />
  <circle cx="120" cy="200" r="2.5" fill="#2ecc71" />
  <circle cx="360" cy="80" r="5" fill="white" stroke="#2ecc71" stroke-width="2.5" />
  <circle cx="360" cy="80" r="2.5" fill="#2ecc71" />
  <!-- Caption -->
  <text x="250" y="292" text-anchor="middle" font-size="13" fill="#333333" font-style="italic">LINESTRING (0 0, 3 4)</text>
  <!-- Legend -->
  <rect x="73" y="255" width="12" height="12" rx="2" fill="#4a90d9" stroke="#4a90d9" stroke-width="1" />
  <text x="89" y="266" font-size="13" fill="#333333">Point A</text>
  <rect x="183" y="255" width="12" height="12" rx="2" fill="#d94a4a" stroke="#d94a4a" stroke-width="1" />
  <text x="199" y="266" font-size="13" fill="#333333">Point B</text>
  <rect x="293" y="255" width="12" height="12" rx="2" fill="#2ecc71" stroke="#2ecc71" stroke-width="1" />
  <text x="309" y="266" font-size="13" fill="#333333">Shortest line</text>
</svg>
