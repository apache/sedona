name: Scala and Java build

on:
  push:
    branches:
      - master
    paths:
      - 'common/**'
      - 'spark/**'
      - 'spark-shaded/**'
      - 'flink/**'
      - 'flink-shaded/**'
      - 'snowflake/**'
      - 'pom.xml'
      - '.github/workflows/java.yml'
  pull_request:
    branches:
      - '*'
    paths:
      - 'common/**'
      - 'spark/**'
      - 'spark-shaded/**'
      - 'flink/**'
      - 'flink-shaded/**'
      - 'snowflake/**'
      - 'pom.xml'
      - '.github/workflows/java.yml'

env:
  MAVEN_OPTS: -Dmaven.wagon.httpconnectionManager.ttlSeconds=60
  DO_NOT_TRACK: true
  SPARK_LOCAL_IP: 127.0.0.1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        include:
          - spark: 4.1.1
            scala: 2.13.17
            jdk: '17'
          - spark: 4.0.2
            scala: 2.13.17
            jdk: '17'
          - spark: 3.5.8
            scala: 2.13.8
            jdk: '11'
            skipTests: ''
          - spark: 3.5.8
            scala: 2.12.15
            jdk: '11'
            skipTests: ''
          - spark: 3.4.0
            scala: 2.13.8
            jdk: '11'
            skipTests: ''
          - spark: 3.4.0
            scala: 2.12.15
            jdk: '11'
            skipTests: ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.jdk }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.10'
      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - env:
          SPARK_VERSION: ${{ matrix.spark }}
          SCALA_VERSION: ${{ matrix.scala }}
          SKIP_TESTS: ${{ matrix.skipTests }}
        run: |
          SPARK_COMPAT_VERSION=${SPARK_VERSION:0:3}

          if [[ "${SPARK_VERSION}" == "3.5"* ]] || [[ "${SPARK_VERSION}" == "4."* ]]; then
              pip install pyspark==$SPARK_VERSION pandas shapely apache-sedona pyarrow
              export SPARK_HOME=$(python -c "import pyspark; print(pyspark.__path__[0])")
          fi

          mvn -q clean install -Dspark=${SPARK_COMPAT_VERSION} -Dscala=${SCALA_VERSION:0:4} -Dspark.version=${SPARK_VERSION} ${SKIP_TESTS}
      - run: mkdir staging
      - run: cp spark-shaded/target/sedona-*.jar staging
      - run: |
          [ -d "flink-shaded/target/" ] && cp flink-shaded/target/sedona-*.jar staging 2>/dev/null || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-jars_spark-${{ matrix.spark }}_scala-${{ matrix.scala }}_jdk-${{ matrix.jdk }}
          path: staging
