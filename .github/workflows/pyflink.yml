name: Sedona Pyflink Test

on:
  push:
    branches:
      - master
    paths:
      - 'common/**'
      - 'flink/**'
      - 'flink-shaded/**'
      - 'pom.xml'
      - 'python/**'
      - '.github/workflows/pyflink.yml'
  pull_request:
    branches:
      - '*'
    paths:
      - 'common/**'
      - 'flink/**'
      - 'flink-shaded/**'
      - 'pom.xml'
      - 'python/**'
      - '.github/workflows/pyflink.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - python: '3.10'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: sudo apt-get -y install python3-pip python-dev-is-python3
      - run: mvn package -pl "org.apache.sedona:sedona-flink-shaded_2.12" -am -DskipTests
      - run: sudo pip3 install -U setuptools
      - run: sudo pip3 install -U wheel
      - run: sudo pip3 install -U virtualenvwrapper
      - run: python3 -m pip install uv
      - run: cd python
      - run: rm pyproject.toml
      - run: uv init --no-workspace
      - run: uv add apache-flink==1.20.1
      - run: uv add pytest --dev
      - run: |
          SEDONA_PYFLINK_EXTRA_JARS=${PWD}/$(find flink-shaded/target -name sedona-flink*.jar)
          uv run pytest -v -m flink ./tests
